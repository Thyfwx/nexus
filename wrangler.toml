# Cloudflare Pages Configuration
# This file is for the Nexus Terminal frontend

[vars]
BACKEND_URL = "nexus-terminalnexus.onrender.com"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "no-referrer-when-downgrade"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://static.cloudflareinsights.com; connect-src 'self' https://nexus-terminalnexus.onrender.com wss://nexus-terminalnexus.onrender.com https://api.groq.com https://router.huggingface.co; img-src 'self' data: https://*.googleusercontent.com; frame-src https://accounts.google.com;"
