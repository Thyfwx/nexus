<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Web Terminal</title>
    <link rel="stylesheet" href="style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="monitor">
        <div class="screen-glare"></div>
        <div class="glass-panel">
            <header class="status-bar">
                <div class="status-item"><span class="stat-label">CPU</span> <span id="cpu-stat">--</span></div>
                <div class="status-item"><span class="stat-label">MEM</span> <span id="mem-stat">--</span></div>
                <div class="status-item status-title" id="status-title">NEXUS OS</div>
                <div class="status-item"><span class="stat-label">MODE</span> <span id="mode-indicator">NEXUS</span></div>
            </header>

            <main class="terminal-container" id="terminal-container">
                <div class="terminal-output" id="terminal-output"></div>
                <div class="terminal-input-wrapper">
                    <span class="prompt" id="prompt-label">guest@nexus:~$</span>
                    <input type="text" id="terminal-input" autocomplete="off" autofocus spellcheck="false">
                    <label class="attach-btn" title="Attach image for AI scan">
                        📎
                        <input type="file" id="img-input" accept="image/*" style="display:none;">
                    </label>
                </div>
            </main>

            <aside class="quick-actions">
                <!-- Auth section — populated by JS -->
                <div id="auth-section"></div>

                <div class="aside-header">GAMES</div>
                <button class="action-btn" data-cmd="play wordle">Wordle</button>
                <button class="action-btn" data-cmd="play snake">Snake</button>
                <button class="action-btn" data-cmd="play pong">Pong</button>
                <button class="action-btn" data-cmd="play minesweeper">Mines</button>
                <button class="action-btn" data-cmd="play flappy">Flappy</button>
                <button class="action-btn" data-cmd="play breakout">Breakout</button>
                <button class="action-btn" onclick="startInvaders()">Invaders</button>

                <div class="aside-header" style="margin-top:10px;">AI MODE</div>
                <div class="mode-picker">
                    <button class="mode-btn active" data-mode="nexus" title="Standard Nexus AI">NEXUS</button>
                    <button class="mode-btn" data-mode="evil" title="Unfiltered/Raw Mode">EVIL</button>
                    <button class="mode-btn" data-mode="coder" title="Technical/Code Focus">CODER</button>
                    <button class="mode-btn" data-mode="sage" title="Philosophical Mode">SAGE</button>
                    <button class="mode-btn" data-mode="void" title="Abyss/Cryptic Mode" style="grid-column: span 2; border-color:#f0f; color:#f0f;">VOID</button>
                </div>

                <div class="aside-header" style="margin-top:10px;">TOOLS</div>
                <button class="action-btn" onclick="showRankingsOverlay()">Rankings</button>
                <button class="action-btn" data-cmd="type test">Type Test</button>
                <button class="action-btn" data-cmd="matrix">Matrix</button>
                <button class="action-btn" data-cmd="monitor">Monitor</button>
                <button class="action-btn" data-cmd="help">Help</button>
                <button class="action-btn" data-cmd="clear">Clear</button>

                <button class="a11y-open-btn" onclick="toggleA11yPanel()" title="Accessibility settings">
                    <span class="a11y-badge">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="1"/>
                            <path d="m9 20 3-6 3 6M6 8l6 2 6-2M12 10v4"/>
                        </svg>
                    </span>
                    <span class="a11y-label">ACCESSIBILITY</span>
                </button>
            </aside>

            <div id="game-gui-container" class="gui-hidden">
                <div id="gui-header">
                    <span id="gui-title">8-BIT SYSTEM</span>
                    <button id="gui-close">X</button>
                </div>
                <div id="gui-content-wrapper">
                    <div id="gui-content"></div>
                    <canvas id="nexus-canvas" width="400" height="400" style="display:none;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         SPACE INVADERS — Fullscreen Overlay
         Lives outside .glass-panel so position:fixed works correctly
    ════════════════════════════════════════════════════════════════ -->
    <div id="invaders-overlay" class="fullscreen-overlay hidden">
        <div class="overlay-header">
            <div class="overlay-hud">
                <span class="overlay-title">SPACE INVADERS</span>
                <div class="inv-stats">
                    <span><span class="inv-stat-label">SCORE</span><b id="inv-score-display">0</b></span>
                    <span><span class="inv-stat-label">WAVE</span><b id="inv-wave-display" style="color:#ff0;">1</b></span>
                    <span id="inv-lives-display" style="color:#f55;font-size:0.9rem;">♥♥♥</span>
                </div>
            </div>
            <button class="overlay-close" onclick="closeInvadersOverlay()">✕ CLOSE</button>
        </div>
        <div class="inv-game-area">
            <canvas id="invaders-canvas" style="display:none;"></canvas>
            <p class="inv-controls-hint" style="display:none;">← → MOVE &nbsp;·&nbsp; SPACE TO FIRE &nbsp;·&nbsp; SPACE TO RETRY</p>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         RANKINGS — Fullscreen Overlay
    ════════════════════════════════════════════════════════════════ -->
    <div id="rankings-overlay" class="fullscreen-overlay hidden">
        <div class="overlay-header">
            <span class="overlay-title">RANKINGS</span>
            <div style="display:flex;align-items:center;gap:14px;">
                <div id="rankings-user-badge"></div>
                <button class="overlay-close" onclick="closeRankingsOverlay()">✕ CLOSE</button>
            </div>
        </div>
        <div class="rankings-body">
            <div id="rankings-auth-cta" class="rankings-auth-cta hidden"></div>
            <div id="rankings-tabs" class="rankings-game-tabs"></div>
            <div id="rankings-content"></div>
        </div>
    </div>

    <script src="secrets.js?v=9"></script>
    <script src="terminal.js?v=9"></script>
</body>
</html>
